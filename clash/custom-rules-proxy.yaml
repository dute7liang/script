# Clash 规则示例 - 自定义代理规则
# 该规则示例展示了如何使用不同类型的规则来匹配域名和 IP 地址。
# 你可以根据需要修改这些规则来适应你的网络环境。
#
# payload:
#   # 域名后缀走代理
#   - DOMAIN-SUFFIX,example.com
#   # 完整域名走代理
#   - DOMAIN,www.example.net
#   # 域名关键词走代理
#   - DOMAIN-KEYWORD,example-keyword
#   # IP 或网段走代理
#   - IP-CIDR,203.0.113.10/32,no-resolve
#   - IP-CIDR,198.51.100.0/24,no-resolve

payload: []
